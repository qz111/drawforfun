<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Body -->
  <ellipse cx="200" cy="278" rx="118" ry="98" fill="none" stroke="#1a1a1a" stroke-width="2.5"/>
