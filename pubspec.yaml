name: drawforfun
description: "A children's coloring app for iPad (ages 3-8)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  image: ^4.2.0
  path_provider: ^2.1.2
  file_picker: ^6.1.1
  image_gallery_saver: ^2.0.3
  provider: ^6.1.2
  flutter_svg: ^2.0.0
  google_fonts: ^6.2.1
  video_player: ^2.11.1
  fvp: ^0.35.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/line_art/
    - assets/icon/
    - assets/splash/

# ── flutter_launcher_icons ────────────────────────────────────────────────────
# Run after dropping assets/icon/app_icon.png (1024×1024, no rounded corners):
#   flutter pub get
#   dart run flutter_launcher_icons
#
# The tool generates all required iPad/iPhone/Android icon sizes from the
# single source PNG and writes them into the native project directories.
flutter_launcher_icons:
  android: true
  ios: true
  # Path to the hi-res source PNG (place file here first).
  image_path: "assets/icon/app_icon.png"
  # iOS-specific: remove the alpha channel so Xcode accepts it.
  remove_alpha_ios: true
  # Minimum iOS version already set in Xcode — no override needed here.
  web:
    generate: false
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
    icon_size: 48
  macos:
    generate: false
