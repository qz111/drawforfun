name: drawforfun
description: "A children's coloring app for iPad (ages 3-8)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  image: ^4.2.0
  path_provider: ^2.1.2
  file_picker: ^6.1.1
  image_gallery_saver: ^2.0.3
  provider: ^6.1.2
  flutter_svg: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/line_art/
